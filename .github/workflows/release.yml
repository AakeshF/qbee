name: release

# Tag-triggered AppImage release. Push a tag like v0.1.0 and this workflow:
#   1. Builds the AppImage for x64 + arm64
#   2. Generates SHA-256 checksums
#   3. Creates a GitHub Release with both AppImages + checksums attached
#
# Phase 6 limitations (see docs/02-Phases/Phase-6-AppImage-Release.md):
#   - GPG signing is not yet wired (planned: GPG_PRIVATE_KEY secret + sign step)
#   - In-app updater is not yet implemented
#   - The worker is not bundled into the AppImage today (Phase 6.5 work)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.0). Used as filename suffix.'
        required: true

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runs-on: ubuntu-22.04,     arch: x64,   appimage_arch: x86_64 }
          - { runs-on: ubuntu-22.04-arm, arch: arm64, appimage_arch: aarch64 }

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # GITHUB_REF on a tag push is "refs/tags/v0.1.0" → strip the "v"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 build-essential libx11-dev libxkbfile-dev libsecret-1-dev \
            libnss3 libgbm-dev libgtk-3-0 libxss1 libasound2 fakeroot rpm

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Cache editor node_modules
        uses: actions/cache@v4
        with:
          path: editor/node_modules
          key: editor-npm-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('editor/package-lock.json') }}

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Install editor deps
        working-directory: editor
        run: npm install --legacy-peer-deps

      - name: Install appimagetool
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage" -o "$HOME/.local/bin/appimagetool"
          chmod +x "$HOME/.local/bin/appimagetool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Ensure AppImage icon
        run: |
          # Phase 0 deferred icon design. Generate a placeholder so the build doesn't fail.
          # Replace scripts/appimage/qbee.png in your repo with real artwork before the next release.
          if [ ! -f scripts/appimage/qbee.png ]; then
            sudo apt-get install -y imagemagick
            convert -size 512x512 xc:'#3a6cd8' -gravity center -fill white -pointsize 320 -annotate +0+0 'Q' scripts/appimage/qbee.png
            echo '::warning::Using placeholder QBee icon. Replace scripts/appimage/qbee.png with real artwork.'
          fi

      - name: Build AppImage
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: bash scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QBee-${{ matrix.appimage_arch }}
          path: |
            .build/dist/QBee-*.AppImage
            .build/dist/QBee-*.AppImage.sha256

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/QBee-*.AppImage
            artifacts/**/QBee-*.AppImage.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
